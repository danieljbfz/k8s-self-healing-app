# Kubernetes Deployment manifest for our Flask application

# In Docker, we built a container image that packaged all of our code, 
# dependencies, and server into a single artifact. In Kubernetes, we decide how 
# many copies of that container we want to run, how those copies should behave, 
# and how the cluster should react when something goes wrong. A Deployment is 
# the tool we use to describe this desired state. It acts like a set of 
# instructions that tell the cluster what to run, how many instances to keep 
# alive, and how to replace them when we update the image. The cluster uses 
# these instructions to make sure our application remains available even when 
# some machines fail or when we ship a new version of our code.

# ============================================================================
# 📝 API VERSION AND KIND
# ============================================================================

# Kubernetes organizes everything into objects, and each object describes some
# part of the system. A Deployment is one of these objects. It tells the system
# to run several identical copies (or instances) of an application and replace 
# them if they fail. These instances are packaged as Pods, which are the 
# smallest deployable units in Kubernetes. A Pod can contain one or more 
# containers that share the same network, storage, and specifications for how 
# to run them. The 'apiVersion' field tells Kubernetes which version of the 
# Kubernetes API we are using, while the 'kind' field tells Kubernetes which 
# type of object we are creating.
apiVersion: apps/v1 
kind: Deployment

# ============================================================================
# 🏷️ METADATA
# ============================================================================

# Every Kubernetes object includes a metadata section that gives the object a
# name and a set of labels. The name helps us reference the object later when
# we want to inspect, update, or delete it. We can do this using the `kubectl`
# command-line tool or other Kubernetes clients. For example, to inspect the
# Deployment, we would run `kubectl get deployment <deployment-name>`, and to
# scale it up or down, we would run `kubectl scale deployment <deployment-name> 
# --replicas=<number>`. The labels help us group and filter objects in the
# cluster. They do not change how the Deployment behaves, but they give us a 
# way to organize our resources when the system grows and we have many 
# different components running alongside each other.
metadata:
  name: webapp-deployment
  labels:
    app: webapp
    version: v1

# ============================================================================
# ⚙️ DEPLOYMENT SPECIFICATION
# ============================================================================

# The 'spec' section is where we declare what we want the Deployment to do.
# Everything inside this section describes the desired state of our 
# application. Kubernetes keeps comparing the current state with this desired 
# state and tries to bring the system back into alignment whenever it notices 
# a difference. This is one of the core ideas in Kubernetes and one of the main
# reasons why it is able to restart containers and heal itself automatically.
spec:

  # ============================================================================
  # 📦 REPLICAS
  # ============================================================================

  # A Deployment manages several identical copies of our application. Each copy
  # lives inside its own Pod and runs the same container image. When we set the
  # number of replicas, we are telling Kubernetes how many Pods should be
  # running at all times. If one stops running, Kubernetes starts a new one. If
  # we scale the replica count to a larger number, Kubernetes creates more Pods.
  # If we scale it down, Kubernetes removes Pods until the number matches the
  # value we set here.
  replicas: 3

  # ============================================================================
  # 🎯 SELECTOR
  # ============================================================================

  # The selector tells the Deployment which Pods belong to it. This connection 
  # is important because Pods are not tied to a Deployment in any automatic way. 
  # Instead, the Deployment watches for Pods whose labels match the selector 
  # we define here. When the Deployment needs to create or remove Pods, it uses 
  # these labels to identify the correct group. If the labels on the Pod 
  # template change, the selector must match them or the Deployment will no 
  # longer recognize its own Pods.
  selector:
    matchLabels:
      app: webapp

  # ==========================================================================
  # 🧩 POD TEMPLATE
  # ==========================================================================

  # The template section describes what each Pod should look like and how they
  # should behave. The Deployment uses this template every time it needs to 
  # create a new Pod, so any change we make here will shape every replica. The 
  # cluster treats the template as a blueprint and always creates new Pods that 
  # follow its rules.
  template:
    metadata:

      # These labels are attached to every Pod created from this template. They
      # must match the selector above so Kubernetes knows that these Pods belong
      # to this Deployment. Labels also help other parts of the system, such as
      # Services or monitoring tools, find the Pods that make up our application.
      labels:
        app: webapp
        version: v1

    # ------------------------------------------------------------------------
    # 🧩 POD SPEC
    # ------------------------------------------------------------------------

    # Inside the Pod specification, we describe the container that should run 
    # inside each Pod. A Pod can host multiple containers, if they need to
    # share resources or communicate with each other, but most web applications
    # use a single container per Pod. Everything in this section applies to all 
    # replicas created by the Deployment.
    spec:
      # ======================================================================
      # 🧱 CONTAINER DEFINITION
      # ======================================================================

      # Inside the pod we define one container that runs our application. We
      # point to the image we built earlier and set a few options that instruct
      # Kubernetes how to run it. The name we give here becomes visible in logs
      # and debugging tools, so it helps to choose something descriptive. The
      # image field tells Kubernetes which version of our container to use, and
      # the pull policy controls when Kubernetes tries to fetch newer copies of
      # it from a registry.
      containers:
      - name: webapp

        # This is the container image that runs inside each pod. We build and tag
        # this image ahead of time and push it to a location that the cluster can
        # reach.
        image: webapp:latest

        # The image pull policy tells Kubernetes when to download the image.
        # With the 'IfNotPresent' value, we tell it only pull the image
        # if it is not already present on the node, though for a tag like 'latest', 
        # we might prefer 'Always' to ensure we get the newest version every time.

        # This policy tells Kubernetes when to pull the image. With this value we
        # ask it to use the local image if it is already present on the node.
        imagePullPolicy: IfNotPresent

        # ====================================================================
        # 🌐 PORTS
        # ====================================================================

        # The container listens for HTTP requests on port 5000. This port is 
        # the same one we exposed in the Dockerfile. Declaring it here helps 
        # other parts of Kubernetes understand how to direct network traffic 
        # into the Pod. The 'name' field is optional, but it makes the port 
        # easier to reference when we connect this Deployment to a Service.

        # Here we make port 5000 available inside the Pod so that other 
        # components in the cluster can send requests to our Flask 
        # application. This setting does not expose the port to the outside 
        # world by itself. It only declares which port the container listens
        # on internally, much like the `EXPOSE` command we used in our 
        # Dockerfile. We can later use this information to create Services or 
        # Ingress rules that route external traffic to this port and make our 
        # application accessible from outside the cluster.
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP

        # ====================================================================
        # 🌱 ENVIRONMENT VARIABLES
        # ====================================================================

        # Environment variables help us avoid hardcoding details in the code 
        # itself, which makes the application easier to adjust when we move 
        # between development, testing, and production environments. We set 
        # them here so that all replicas start with the same values, and we 
        # can later override them using ConfigMaps or Secrets when we need
        # more flexibility and control.
        env:
        - name: APP_VERSION
          value: "1.0.0"
        - name: APP_ENV
          value: "production"
        - name: PORT
          value: "5000"

        # ====================================================================
        # 📊 RESOURCE MANAGEMENT
        # ====================================================================

        # Kubernetes schedules Pods onto machines that have enough capacity to
        # run them. To make these decisions, the scheduler needs to know how much
        # CPU and memory a container expects to use.

        # Kubernetes schedules Pods onto nodes that have enough room for them.
        # To help it make these decisions, we describe the amount of CPU and
        # memory our container expects to use. Requests tell Kubernetes the
        # smallest amount of resources the container needs in order to run, and
        # limits describe the upper boundary it is allowed to consume. If the
        # container uses more memory than its limit, it will be stopped. If it
        # uses more CPU than the limit, it will be slowed down rather than
        # stopped. These settings help keep the entire cluster balanced so that
        # no single workload overwhelms a particular node.
        resources:
          requests:
            memory: "128Mi"   # 128 megabytes
            cpu: "100m"       # 0.1 CPU cores (100 millicores)
          limits:
            memory: "256Mi"   # 256 megabytes
            cpu: "200m"       # 0.2 CPU cores

        # ====================================================================
        # ❤️ LIVENESS PROBE
        # ====================================================================

        # A liveness probe tells Kubernetes how to check whether our container is
        # still functioning. If this probe fails several times in a row, the
        # container is restarted. This helps the application recover from
        # situations where it becomes stuck or enters a state it cannot exit on
        # its own. We use a simple HTTP GET request to the /health endpoint, and
        # we allow the container a bit of time to start before the first check.
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # ====================================================================
        # 🟢 READINESS PROBE
        # ====================================================================

        # A readiness probe focuses on whether a container is prepared to serve
        # traffic. A container might be running yet still warming up, loading
        # data, or waiting on another service. When this probe reports that the
        # container is not ready, Kubernetes temporarily removes the Pod from
        # the list of addresses that can receive requests. When the probe
        # finally succeeds, the Pod is added back to the pool so that it can
        # start receiving traffic again. This helps ensure that users do not 
        # experience errors or delays because requests are being sent to Pods 
        # that are not yet prepared to handle them. Here, we use the same 
        # /health endpoint as the liveness probe, but we start checking it 
        # sooner and with a shorter timeout.
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2

        # ====================================================================
        # ⏳ STARTUP PROBE
        # ====================================================================

        # A startup probe helps with applications that need extra time before
        # they can respond. During this startup period, the liveness and
        # readiness probes stay inactive so they do not mistakenly trigger a
        # restart of the container. Once the startup probe succeeds, Kubernetes 
        # begins using the other probes to monitor the container. This setting 
        # is not always necessary, but we include it to show how Kubernetes 
        # supports gradual startup patterns. 
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 5
          failureThreshold: 12

      # ========================================================================
      # 🔁 POD RESTART POLICY
      # ========================================================================
      
      # The Pod restart policy tells Kubernetes how to react when the container 
      # inside the Pod stops running. The default setting 'Always' means the Pod 
      # will be restarted any time the container stops, whether due to a crash, 
      # an error, or a normal shutdown. This is the most common choice for
      # applications that run indefinitely and need to be available at all 
      # times, such as web servers or databases. Other options include 
      # 'OnFailure', which restarts the Pod only if the container exits with an 
      # error (non-zero exit code), and 'Never', which means the Pod will not be 
      # restarted under any circumstances.
      restartPolicy: Always

      # ========================================================================
      # ⏲️ TERMINATION GRACE PERIOD
      # ========================================================================

      # When the Pod is asked to shut down (e.g., by manual deletion with 
      # `kubectl delete`, a controller performing a rolling update, or a 
      # scale-down event), the termination grace period gives the application 
      # time to finish ongoing work and clean up resources before it is 
      # forcefully killed and removed from the cluster. During this grace 
      # period, Kubernetes sends a SIGTERM signal to the main process inside 
      # the container to allow it to shut down gracefully. If the process does 
      # not exit within the specified time, Kubernetes sends a SIGKILL signal 
      # to forcefully terminate it.
      terminationGracePeriodSeconds: 30

# ============================================================================
# 🔧 DEPLOYMENT STRATEGY
# ============================================================================

# Kubernetes can update the running Pods gradually rather than replacing them
# all at once. This section defines how it performs those updates. A rolling 
# update creates a new Pod while keeping the old one running. Once the new Pod 
# is ready, the old one is killed and removed. This lets the application stay 
# online without any downtime. We leave this commented out because we are using 
# the default settings, but it remains here to illustrate how we could customize 
# this behavior in the future.
#
# strategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxSurge: 1
#     maxUnavailable: 0